name: Build & Release

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "workshopdl.py"   # блок запуска
      - "!install/**"
  workflow_dispatch:
permissions:
  contents: write

jobs:

  # ── Генерируем версию из даты+коммита ────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
      is_dev: ${{ steps.gen.outputs.is_dev }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: gen
        run: |
          BASE_TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          
          if [ "${{ github.ref_name }}" = "dev" ]; then
            TAG="${BASE_TAG}-dev"
            echo "is_dev=true" >> $GITHUB_OUTPUT
          else
            TAG="${BASE_TAG}"
            echo "is_dev=false" >> $GITHUB_OUTPUT
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $TAG"

      - name: Create git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@://github.com"
          git tag ${{ steps.gen.outputs.tag }}
          git push origin ${{ steps.gen.outputs.tag }}


  # ── Windows EXE ──────────────────────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 requests pyinstaller

      - name: Build EXE
        run: pyinstaller WorkshopDL.spec

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist\WorkshopDL.exe release\
          if (Test-Path Modules) { 
              Copy-Item Modules release\Modules -Recurse -Force
          }
          Compress-Archive -Path release\* -DestinationPath WorkshopDL-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/WorkshopDL.exe
            WorkshopDL-windows.zip

  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libdbus-1-3 libegl1 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0

      - name: Install dependencies
        run: pip install PyQt5 requests pyinstaller

      - name: Build binary
        run: pyinstaller WorkshopDL.spec

      - name: Package tar.gz
        run: |
          mkdir -p release
          cp dist/WorkshopDL release/
          [ -d Modules ] && cp -r Modules release/
          cd release && tar -czf ../WorkshopDL-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/WorkshopDL
            WorkshopDL-linux.tar.gz

  # ── macOS app ─────────────────────────────────────────────────────────────────
  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 requests pyinstaller

      - name: Build app
        run: pyinstaller WorkshopDL.spec

      - name: Package ZIP
        run: |
          mkdir -p release
          if [ -d dist/WorkshopDL.app ]; then
            cp -r dist/WorkshopDL.app release/
            TARGET_DIR="release/WorkshopDL.app/Contents/Resources"
            mkdir -p "$TARGET_DIR"
            [ -d Modules ] && cp -r Modules "$TARGET_DIR/"
          else
            cp dist/WorkshopDL release/
          fi
          
          [ -d Modules ] && cp -r Modules release/
          
          cd release && zip -r ../WorkshopDL-macos.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: WorkshopDL-macos.zip

  # ── Публикация релиза ─────────────────────────────────────────────────────────
  release:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          
          name: ${{ needs.version.outputs.is_dev == 'true' && format('[Dev Build] WorkshopDL {0}', needs.version.outputs.tag) || format('WorkshopDL {0}', needs.version.outputs.tag) }}
          
          body: |
            ## WorkshopDL ${{ needs.version.outputs.tag }}
            ${{ needs.version.outputs.is_dev == 'true' && '> ⚠️ ВНИМАНИЕ: Это тестовая сборка из ветки разработки (dev)!' || '> Автоматический выпуск релиза.' }}

            ### 📦 Файлы сборки
            * **Windows (Архив со вложенными языками):** `WorkshopDL-windows.zip`
            * **Linux (Для Steam Deck / Desktop):** `WorkshopDL-linux.tar.gz`
            * **macOS (Архив приложения):** `WorkshopDL-macos.zip`

            ### 🌐 Локализация
            Все базовые языки теперь зашиты напрямую в исполняемые файлы программы.
          files: |
            windows-build/dist/WorkshopDL.exe
            windows-build/WorkshopDL-windows.zip
            linux-build/WorkshopDL-linux.tar.gz
            macos-build/WorkshopDL-macos.zip
            
          # Если это dev-ветка, релиз автоматически получит плашку Pre-release
          prerelease: ${{ needs.version.outputs.is_dev == 'true' }}
          draft: false

