name: Build & Release

on:
  push:
    tags:
      - "v*"   # запускается на любой тег вида v1.0.0, v2.3.1 и т.д.

permissions:
  contents: write   # нужно чтобы создавать релизы

jobs:

  # ── Windows EXE ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install PyQt5 requests pyinstaller

      - name: Build EXE
        run: |
          pyinstaller WorkshopDL.spec

      - name: Package release (ZIP с языками)
        run: |
          mkdir release
          copy dist\WorkshopDL.exe release\
          if exist lang_en.json copy lang_en.json release\
          if exist lang_ru.json copy lang_ru.json release\
          if exist lang (xcopy lang release\lang\ /E /I /Q)
          cd release
          powershell Compress-Archive -Path * -DestinationPath ..\WorkshopDL-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/WorkshopDL.exe
            WorkshopDL-windows.zip

  # ── Linux binary ────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Qt requires this on headless Ubuntu)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libdbus-1-3 libegl1 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0

      - name: Install dependencies
        run: |
          pip install PyQt5 requests pyinstaller

      - name: Build binary
        run: |
          pyinstaller WorkshopDL.spec

      - name: Package release
        run: |
          mkdir release
          cp dist/WorkshopDL release/
          [ -f lang_en.json ] && cp lang_en.json release/
          [ -f lang_ru.json ] && cp lang_ru.json release/
          [ -d lang ] && cp -r lang release/lang
          cd release && tar -czf ../WorkshopDL-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/WorkshopDL
            WorkshopDL-linux.tar.gz

  # ── macOS app ───────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install PyQt5 requests pyinstaller

      - name: Build app
        run: |
          pyinstaller WorkshopDL.spec

      - name: Package release
        run: |
          mkdir release
          [ -d dist/WorkshopDL.app ] && cp -r dist/WorkshopDL.app release/ || cp dist/WorkshopDL release/
          [ -f lang_en.json ] && cp lang_en.json release/
          [ -f lang_ru.json ] && cp lang_ru.json release/
          [ -d lang ] && cp -r lang release/lang
          cd release && zip -r ../WorkshopDL-macos.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: WorkshopDL-macos.zip

  # ── Публикация релиза ────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WorkshopDL ${{ github.ref_name }}"
          body: |
            ## WorkshopDL ${{ github.ref_name }}

            ### 📦 Файлы
            | Файл | Платформа | Описание |
            |------|-----------|----------|
            | `WorkshopDL.exe` | Windows | Исполняемый файл |
            | `WorkshopDL-windows.zip` | Windows | EXE + языковые файлы |
            | `WorkshopDL-linux.tar.gz` | Linux | Бинарь + языковые файлы |
            | `WorkshopDL-macos.zip` | macOS | Приложение + языковые файлы |

            ### 🚀 Быстрый старт
            1. Скачай архив для своей платформы
            2. Распакуй в любую папку
            3. Запусти `WorkshopDL.exe` (Windows) или `WorkshopDL` (Linux/macOS)
            4. В настройках нажми **⬇ Скачать SteamCMD автоматически**

            ### 🌐 Языки
            Английский и русский включены. Другие языки — кнопка **⟳** в настройках.

          files: |
            windows-build/dist/WorkshopDL.exe
            windows-build/WorkshopDL-windows.zip
            linux-build/WorkshopDL-linux.tar.gz
            macos-build/WorkshopDL-macos.zip
          draft: false
          prerelease: false
