name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - "workshopdl.py"   # срабатывает только когда меняется основной скрипт

permissions:
  contents: write

jobs:

  # ── Генерируем версию из даты+коммита ────────────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.gen.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: gen
        run: |
          TAG="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $TAG"

      - name: Create git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.gen.outputs.tag }}
          git push origin ${{ steps.gen.outputs.tag }}

  # ── Windows EXE ──────────────────────────────────────────────────────────────
  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 requests pyinstaller

      - name: Build EXE
        run: pyinstaller WorkshopDL.spec

      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist\WorkshopDL.exe release\
          if (Test-Path lang_en.json) { Copy-Item lang_en.json release\ }
          if (Test-Path lang_ru.json) { Copy-Item lang_ru.json release\ }
          if (Test-Path lang)         { Copy-Item lang release\lang -Recurse }
          Compress-Archive -Path release\* -DestinationPath WorkshopDL-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/WorkshopDL.exe
            WorkshopDL-windows.zip

  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libxkbcommon-x11-0 \
            libdbus-1-3 libegl1 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xfixes0

      - name: Install dependencies
        run: pip install PyQt5 requests pyinstaller

      - name: Build binary
        run: pyinstaller WorkshopDL.spec

      - name: Package tar.gz
        run: |
          mkdir release
          cp dist/WorkshopDL release/
          [ -f lang_en.json ] && cp lang_en.json release/
          [ -f lang_ru.json ] && cp lang_ru.json release/
          [ -d lang ] && cp -r lang release/lang
          cd release && tar -czf ../WorkshopDL-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/WorkshopDL
            WorkshopDL-linux.tar.gz

  # ── macOS app ─────────────────────────────────────────────────────────────────
  build-macos:
    needs: version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install PyQt5 requests pyinstaller

      - name: Build app
        run: pyinstaller WorkshopDL.spec

      - name: Package ZIP
        run: |
          mkdir release
          [ -d dist/WorkshopDL.app ] && cp -r dist/WorkshopDL.app release/ || cp dist/WorkshopDL release/
          [ -f lang_en.json ] && cp lang_en.json release/
          [ -f lang_ru.json ] && cp lang_ru.json release/
          [ -d lang ] && cp -r lang release/lang
          cd release && zip -r ../WorkshopDL-macos.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: WorkshopDL-macos.zip

  # ── Публикация релиза ─────────────────────────────────────────────────────────
  release:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "WorkshopDL ${{ needs.version.outputs.tag }}"
          body: |
            ## WorkshopDL ${{ needs.version.outputs.tag }}
            > Автосборка при изменении `workshopdl.py`

            ### 📦 Файлы
            | Файл | Платформа |
            |------|-----------|
            | `WorkshopDL.exe` | Windows (только exe) |
            | `WorkshopDL-windows.zip` | Windows (exe + языки) |
            | `WorkshopDL-linux.tar.gz` | Linux |
            | `WorkshopDL-macos.zip` | macOS |

            ### 🚀 Быстрый старт
            1. Скачай архив для своей платформы и распакуй
            2. Запусти `WorkshopDL.exe` (Windows) или `WorkshopDL` (Linux/macOS)
            3. В настройках нажми **⬇ Скачать SteamCMD автоматически**

            ### 🌐 Языки
            Английский и русский включены. Другие — кнопка **⟳** в настройках.

          files: |
            windows-build/dist/WorkshopDL.exe
            windows-build/WorkshopDL-windows.zip
            linux-build/WorkshopDL-linux.tar.gz
            macos-build/WorkshopDL-macos.zip
          draft: false
          prerelease: false
